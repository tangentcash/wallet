    <style>
      body {
        margin: 0;
        background-color: #000;
      }

      #splashscreen {
        margin: 0;
        min-height: 100vh;
        background-color: #000;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }

      .splash {
        width: 44px;
        height: 44px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .splash:before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        position: absolute;
        top: 37px;
        left: 19px;
        background: #b0f406;
        transform: translate(-10px, -18px);
        animation: triangle-dot-clip 3s cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
      }

      .splash svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .splash svg polygon {
        fill: none;
        stroke: #b0f406;
        stroke-width: 10px;
        stroke-linejoin: round;
        stroke-linecap: round;
        stroke-dasharray: 145 76 145 76;
        stroke-dashoffset: 0;
        animation: triangle-path-clip 3s cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
      }

      @keyframes triangle-path-clip {
        33% {
          stroke-dashoffset: 74;
        }
        66% {
          stroke-dashoffset: 147;
        }
        100% {
          stroke-dashoffset: 221;
        }
      }

      @keyframes triangle-dot-clip {
        33% {
          transform: translate(0, 0);
        }
        66% {
          transform: translate(10px, -18px);
        }
        100% {
          transform: translate(-10px, -18px);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="splashscreen">
      <div class="splash">
        <svg viewBox="0 0 86 80">
          <polygon points="43 8 79 72 7 72"></polygon>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
